<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earn Money App</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

.container{
max-width:500px;
width:100%;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
}

h1{
text-align:center;
}

button{
padding:12px;
margin:6px;
border:none;
background:#3b82f6;
color:white;
border-radius:6px;
cursor:pointer;
width:90%;
font-size:16px;
}

button:hover{
background:#2563eb;
}

input{
padding:10px;
margin:5px;
width:90%;
border-radius:6px;
border:none;
}

.balance{
font-size:22px;
color:#22c55e;
}

.nav{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.nav button{
width:30%;
background:#334155;
}

</style>
</head>

<body>

<div class="container">

<h1>Earn Money App</h1>

<div class="card">

<p>User ID: <span id="uid"></span></p>

<p class="balance">Balance: <span id="balance">0</span> টাকা</p>

<p>Ads Watched: <span id="ads">0</span></p>

<p>Videos Watched: <span id="videos">0</span></p>

</div>

<div class="card">

<button onclick="watchAd()">Watch Ad (2 টাকা)</button>

<button onclick="watchVideo()">Watch Video (3 টাকা)</button>

<button onclick="copyRef()">Copy Referral Link</button>

</div>

<div class="card">

<h3>Withdraw</h3>

<input id="amount" placeholder="Amount">

<input id="phone" placeholder="Bkash / Nagad Number">

<button onclick="withdraw()">Withdraw</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, addDoc, collection }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_PROJECT.firebaseapp.com",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_PROJECT.appspot.com",

messagingSenderId:"XXXX",

appId:"XXXX"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let uid = localStorage.getItem("uid");

if(!uid){

uid = Math.floor(Math.random()*1000000).toString();

localStorage.setItem("uid",uid);

}

document.getElementById("uid").innerText = uid;

const userRef = doc(db,"users",uid);

async function init(){

const snap = await getDoc(userRef);

if(!snap.exists()){

await setDoc(userRef,{

balance:0,

ads:0,

videos:0,

referrals:0

});

}

loadUser();

}

async function loadUser(){

const snap = await getDoc(userRef);

let data = snap.data();

document.getElementById("balance").innerText=data.balance;

document.getElementById("ads").innerText=data.ads;

document.getElementById("videos").innerText=data.videos;

}

window.watchAd = async function(){

alert("Ad playing...");

let snap = await getDoc(userRef);

let data = snap.data();

let balance=data.balance+2;

let ads=data.ads+1;

await updateDoc(userRef,{balance:balance,ads:ads});

loadUser();

alert("2 টাকা যোগ হয়েছে");

}

window.watchVideo = async function(){

alert("Video watching...");

setTimeout(async ()=>{

let snap = await getDoc(userRef);

let data = snap.data();

let balance=data.balance+3;

let videos=data.videos+1;

await updateDoc(userRef,{balance:balance,videos:videos});

loadUser();

alert("3 টাকা যোগ হয়েছে");

},5000)

}

window.copyRef=function(){

let link=window.location.href+"?ref="+uid;

navigator.clipboard.writeText(link);

alert("Referral link copied");

}

window.withdraw = async function(){

let amount=document.getElementById("amount").value;

let phone=document.getElementById("phone").value;

if(amount<20){

alert("Minimum withdraw 20 টাকা");

return;

}

await addDoc(collection(db,"withdraw"),{

user:uid,

amount:amount,

phone:phone,

status:"pending",

time:Date.now()

});

alert("Withdraw request sent");

}

init();

</script>

</body>
</html>
