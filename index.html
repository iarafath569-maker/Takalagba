<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earn App</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, addDoc, collection } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = localStorage.getItem("userId");

if(!userId){
userId = Math.floor(Math.random()*1000000).toString();
localStorage.setItem("userId",userId);
}

const userRef = doc(db,"users",userId);

async function initUser(){

const snap = await getDoc(userRef);

if(!snap.exists()){

await setDoc(userRef,{
balance:0,
ads:0
});

}

loadUser();

}

async function loadUser(){

const snap = await getDoc(userRef);

const data = snap.data();

document.getElementById("balance").innerText=data.balance;
document.getElementById("ads").innerText=data.ads;

}

window.watchAd = async function(){

let snap = await getDoc(userRef);
let data = snap.data();

let newBalance = data.balance + 2;
let newAds = data.ads + 1;

await updateDoc(userRef,{
balance:newBalance,
ads:newAds
});

document.getElementById("balance").innerText=newBalance;
document.getElementById("ads").innerText=newAds;

alert("2 টাকা যোগ হয়েছে");

}

window.withdraw = async function(){

let amount = prompt("Withdraw amount");
let phone = prompt("Bkash number");

await addDoc(collection(db,"withdraw"),{

user:userId,
amount:amount,
phone:phone,
status:"pending"

});

alert("Withdraw request sent");

}

initUser();

</script>

<style>

body{
font-family:sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
background:#3b82f6;
color:white;
border-radius:6px;
margin:5px;
}

</style>

</head>

<body>

<h2>Earn App</h2>

<div class="card">

<p>Balance: <span id="balance">0</span> টাকা</p>
<p>Ads watched: <span id="ads">0</span></p>

<button onclick="watchAd()">Watch Ad</button>

<button onclick="withdraw()">Withdraw</button>

</div>

</body>
</html>
